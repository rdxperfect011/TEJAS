<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>TEJAS Virtual Assistant Demo</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Include the compiled standalone component -->
    <script type="module" src="tejas.js"></script>
  </head>
  <body>
    <!-- Mock Webpage Content -->
    <div class="brand-header">
      <h1>TEJAS Virtual Assistant Demo</h1>
      <p>Scroll up and down to see how the floating widget behaves.</p>
      <div style="margin-top: 20px;">
        <a href="/forms" class="form-btn" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; display: inline-block; margin-right: 10px;">6th Semester Forms</a>
      </div>
    </div>
    <div class="mock-content" style="height: 150vh;">
      <h2>Welcome to your Site</h2>
      <p>The chatbot is located in the bottom right corner of the screen.</p>
    </div>
    
    <!-- Floating Tooltip -->
    <div class="chat-tooltip" id="chat-tooltip">
      <div class="tooltip-icon">✨</div>
      <div class="tooltip-content">
        <strong>TEJAS AI</strong>
        <span>How can I help you today?</span>
      </div>
    </div>

    <!-- Floating Toggle Button -->
    <button id="chat-toggle-btn" aria-label="Toggle Virtual Assistant">
      <svg class="chat-icon default-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
      </svg>
      <svg class="chat-icon close-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>

    <!-- Chat Widget Container -->
    <div id="chat-widget-container" style="display: flex; flex-direction: column;">
      <div class="widget-header">
        <div class="header-avatar-container">
          <img src="https://img.icons8.com/color/48/000000/bot.png" alt="Bot Icon">
          <div class="status-indicator"></div>
        </div>
        <div class="widget-header-text">
          <h3>TEJAS Assistant</h3>
          <span>Online & ready to assist</span>
        </div>
      </div>
      <tejas-chat 
        id="chat-element" 
        demo="false" 
        style="width: 100%; flex: 1; border: none; border-bottom-left-radius: 18px; border-bottom-right-radius: 18px;"
        names='{"ai": {"text": "TEJAS"}}'
        avatars='{
          "ai": {"src": "https://img.icons8.com/color/48/000000/bot.png"}, 
          "user": {"src": "https://img.icons8.com/ios-filled/50/cccccc/user-male-circle.png"}
        }'
      ></tejas-chat>
    </div>

    <!-- Reference to our external JS file instead of inline messy JS -->
    <script type="module" src="script.js"></script>
  </body>
</html>
